appId: dev.kabootar.app
productName: Kabootar
directories:
  output: release
publish:
  - provider: github
    owner: kabootar-dev
    repo: kabootar
win:
  target:
    - nsis
    - zip
  icon: assets/icon.ico
  artifactName: "Kabootar-${version}-win-${arch}.${ext}"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
mac:
  target:
    - dmg
    - zip
  icon: assets/icon.icns
  hardenedRuntime: true
  artifactName: "Kabootar-${version}-mac-${arch}.${ext}"
linux:
  target:
    - AppImage
    - deb
    - rpm
  icon: assets/icon.png
  category: Development
  artifactName: "Kabootar-${version}-linux-${arch}.${ext}"
