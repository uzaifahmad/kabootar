version: '3.8'

services:
  server:
    build: 
      context: ../../apps/server
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=postgres
      - DB_USER=kabootar
      - DB_PASS=secret
      - DB_NAME=kabootar
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=kabootar
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=kabootar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
